<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max - Digital Twin</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        /* The Siri Orb */
        #orb {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.4);
            transition: all 0.2s ease;
            margin-bottom: 40px;
        }
        /* The Animation when speaking */
        .speaking {
            animation: pulse 0.8s infinite alternate;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 30px rgba(0, 242, 254, 0.4); }
            100% { transform: scale(1.15); box-shadow: 0 0 80px rgba(0, 242, 254, 0.8); background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);}
        }
        button {
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            border: none;
            background-color: #333;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background-color: #555; }
        #status { color: #888; font-size: 14px; margin-top: 20px; text-align: center; max-width: 400px;}
    </style>
</head>
<body>

    <div id="orb"></div>
    <button id="startBtn">Start Listening</button>
    <p id="status">System Ready</p>

    <script>
        const startBtn = document.getElementById('startBtn');
        const orb = document.getElementById('orb');
        const status = document.getElementById('status');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();

        startBtn.onclick = () => {
            recognition.start();
            status.innerText = "Listening... (Speak now)";
            orb.style.box-shadow = "0 0 50px rgba(255, 0, 0, 0.5)"; // Turns slightly red when listening
        };

        recognition.onresult = async (event) => {
            const transcript = event.results[0][0].transcript;
            status.innerText = "Thinking: \"" + transcript + "\"";
            orb.style.box-shadow = "0 0 30px rgba(0, 242, 254, 0.4)"; // Reset color

            try {
                // UPDATE THIS URL AFTER DEPLOYMENT
                const response = await fetch('https://persona-twin-api-532164154780.us-central1.run.app/chat', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: transcript })
                });

                const data = await response.json();
                
                // Play audio and start animation
                const audio = new Audio("data:audio/mp3;base64," + data.audio_base64);
                orb.classList.add('speaking');
                status.innerText = "Speaking...";
                audio.play();

                // Stop animation when audio finishes
                audio.onended = () => {
                    orb.classList.remove('speaking');
                    status.innerText = "System Ready";
                };
            } catch (err) {
                status.innerText = "Error: Could not connect to brain.";
                console.error(err);
            }
        };
    </script>
</body>
</html>
